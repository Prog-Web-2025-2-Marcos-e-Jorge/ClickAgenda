$kind: http-request
name: POST - Criar Horário Trabalho
description: "Criar um novo horário de trabalho. Validações: horarioInicio <
  horarioFim, mínimo 15 minutos, sem duplicatas por dia/profissional"
url: http://localhost:8080/api/horario-trabalho
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "diaSemana": "SEGUNDA",
      "horarioInicio": "08:00:00",
      "horarioFim": "18:00:00",
      "diaFolga": false,
      "profissionalId": 1
    }
order: 1000
