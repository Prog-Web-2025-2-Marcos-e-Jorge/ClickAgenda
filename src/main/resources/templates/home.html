<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Página Inicial</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h2 class="logo">CA</h2>

        <nav class="menu">
          <a href="#">Início</a>
          <a href="#">Agenda</a>
          <a href="#">Favoritos</a>
          <a href="#">Perfil</a>
        </nav>
      </aside>

      <div class="main">
        <header class="header">
          <span>Olá, Usuário!</span>
        </header>

        <section class="content">
          <h1>Encontre e agende os melhores profissionais perto de você</h1>

          <input
            type="text"
            placeholder="Buscar por serviços ou profissionais"
            class="search"
          />

          <h2>Categorias</h2>

          <div class="categories">
            <div class="card">Saúde</div>
            <div class="card">Beleza</div>
            <div class="card">Casa</div>
            <div class="card">Aulas</div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
