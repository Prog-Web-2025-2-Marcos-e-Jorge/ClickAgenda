<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{baseLayout :: baseHead(null)}"></head>

  <body>
    <div class="app">
      <aside th:replace="~{baseLayout :: baseSidebar}"></aside>
      <div class="main">
        <header th:replace="~{baseLayout :: baseTopbar}"></header>
        <div class="content">
          <main>
            <h1>Cadastrar Novo Serviço</h1>

            <div th:if="${erro}" class="alert alert-error">
              <p th:text="${erro}">Ocorreu um erro ao salvar o serviço</p>
            </div>

            <form
              th:action="@{/servico}"
              th:object="${servico}"
              method="POST"
              class="form-container"
            >
              <!-- Nome -->
              <div class="form-group">
                <label for="nome">Nome do Serviço</label>
                <input
                  type="text"
                  id="nome"
                  th:field="*{nome}"
                  placeholder="Ex: Corte de Cabelo, Massagem..."
                  required
                />
                <small
                  th:if="${#fields.hasErrors('nome')}"
                  th:errors="*{nome}"
                  class="error-message"
                ></small>
              </div>

              <!-- Valor -->
              <div class="form-group">
                <label for="valor">Valor (R$)</label>
                <input
                  type="number"
                  id="valor"
                  th:field="*{valor}"
                  step="0.01"
                  min="0.1"
                  required
                />
                <small
                  th:if="${#fields.hasErrors('valor')}"
                  th:errors="*{valor}"
                  class="error-message"
                ></small>
              </div>

              <!-- Duração -->
              <div class="form-group">
                <label for="duracaoMinutos">Duração (minutos)</label>
                <input
                  type="number"
                  id="duracaoMinutos"
                  th:field="*{duracaoMinutos}"
                  min="15"
                  required
                />
                <small
                  th:if="${#fields.hasErrors('duracaoMinutos')}"
                  th:errors="*{duracaoMinutos}"
                  class="error-message"
                ></small>
              </div>

              <!-- Profissional: select para ADMIN, campo oculto para PROFISSIONAL -->
              <div
                class="form-group"
                th:if="${session.usuarioPerfil == 'ADMIN'}"
              >
                <label for="profissionalId">Profissional</label>
                <select
                  id="profissionalId"
                  th:field="*{profissionalId}"
                  required
                >
                  <option value="">-- Selecione um profissional --</option>
                  <option
                    th:each="prof : ${profissionais}"
                    th:value="${prof.id}"
                    th:text="${prof.nome}"
                  ></option>
                </select>
                <small
                  th:if="${#fields.hasErrors('profissionalId')}"
                  th:errors="*{profissionalId}"
                  class="error-message"
                ></small>
              </div>

              <div th:unless="${session.usuarioPerfil == 'ADMIN'}">
                <input type="hidden" th:field="*{profissionalId}" />
                <div class="form-group">
                  <label>Profissional</label>
                  <p
                    th:text="${session.usuarioNome}"
                    style="
                      padding: 12px;
                      background: #f9fafb;
                      border: 1px solid #d1d5db;
                      border-radius: 6px;
                    "
                  >
                    Nome
                  </p>
                </div>
              </div>

              <!-- Categoria -->
              <div class="form-group">
                <label for="categoriaId">Categoria</label>
                <select id="categoriaId" th:field="*{categoriaId}" required>
                  <option value="">-- Selecione uma categoria --</option>
                  <option
                    th:each="cat : ${categorias}"
                    th:value="${cat.id}"
                    th:text="${cat.nome}"
                  ></option>
                </select>
                <small
                  th:if="${#fields.hasErrors('categoriaId')}"
                  th:errors="*{categoriaId}"
                  class="error-message"
                ></small>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  Salvar Serviço
                </button>
                <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
              </div>
            </form>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
