<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{baseLayout :: baseHead(null)}"></head>

  <body>
    <div class="app">
      <aside th:replace="~{baseLayout :: baseSidebar}"></aside>
      <div class="main">
        <header th:replace="~{baseLayout :: baseTopbar}"></header>
        <div class="content">
          <main>
            <h1>Profissionais</h1>

            <p th:unless="${not #lists.isEmpty(profissionais)}">
              Nenhum profissional encontrado.
            </p>

            <div class="professionals-grid">
              <div th:each="prof : ${profissionais}" class="professional-card">
                <div class="card-info">
                  <h4 th:text="${prof.nome}">Nome</h4>
                  <span class="rating">
                    <i class="bi bi-star-fill"></i>
                    <!-- a avaliação virá do objeto prof quando tiver dados -->
                    5.0
                  </span>
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
