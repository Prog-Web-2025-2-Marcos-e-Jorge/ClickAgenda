<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{baseLayout :: baseHead}"></head>
  <th:block>
    <link rel="stylesheet" th:href="@{/css/registro.css}" />
  </th:block>

  <body>
    <main class="register-container">
      <div class="register-box">
        <h1>Click Agenda</h1>
        <p class="subtitle">Crie sua conta agora</p>

        <div th:if="${param.error}" class="alert alert-error">
          <p th:text="${param.error}">Erro ao registrar</p>
        </div>

        <div th:if="${error}" class="alert alert-error">
          <p th:text="${error}">Erro ao registrar</p>
        </div>

        <form th:action="@{/registro}" method="post" class="register-form">
          <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Digite seu nome completo"
              required
              autofocus
            />
          </div>

          <div class="form-group">
            <label for="cpf">CPF</label>
            <input
              type="text"
              id="cpf"
              name="cpf"
              placeholder="000.000.000-00"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Digite seu email"
              required
            />
          </div>

          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input
              type="tel"
              id="telefone"
              name="telefone"
              placeholder="(11) 99999-9999"
              required
            />
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Mínimo 8 caracteres"
              required
            />
          </div>

          <div class="form-group">
            <label for="senhaConfirmacao">Confirmar Senha</label>
            <input
              type="password"
              id="senhaConfirmacao"
              name="senhaConfirmacao"
              placeholder="Confirme sua senha"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary">Criar Conta</button>
        </form>

        <div class="register-footer">
          <p>Já tem uma conta? <a th:href="@{/login}">Fazer login</a></p>
        </div>
      </div>
    </main>
  </body>
</html>
