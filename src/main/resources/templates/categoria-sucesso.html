<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{baseLayout :: baseHead}"></head>

  <body>
    <aside th:replace="~{baseLayout :: baseSidebar}"></aside>

    <header th:replace="~{baseLayout :: baseTopbar}"></header>

    <main>
      <h1>Categoria Cadastrada com Sucesso!</h1>
      <p>A categoria foi adicionada ao sistema e está disponível para uso.</p>

      <div class="success-actions">
        <a th:href="@{/}" class="btn btn-primary">Voltar ao Início</a>
        <a th:href="@{/categoria/novo}" class="btn btn-secondary"
          >Cadastrar Outra Categoria</a
        >
      </div>
    </main>
  </body>
</html>
