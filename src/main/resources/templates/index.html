<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{baseLayout :: baseHead(null)}"></head>

  <body>
    <div class="app">
      <aside th:replace="~{baseLayout :: baseSidebar}"></aside>

      <div class="main">
        <header th:replace="~{baseLayout :: baseTopbar}"></header>

        <div class="content">
          <main>
            <h1>Olá, funcionou</h1>

            <!-- Hero -->
            <section>
              <h2>Encontre e agende os melhores profissionais perto de você</h2>
              <form th:action="@{/buscar}" method="get">
                <input
                  type="text"
                  name="q"
                  placeholder="Buscar por serviços ou profissionais"
                />
              </form>
            </section>

            <!-- Categorias -->
            <section>
              <h2>Categorias</h2>

              <p th:unless="${not #lists.isEmpty(categorias)}">
                Nenhuma categoria encontrada.
              </p>

              <div class="categories" th:if="${not #lists.isEmpty(categorias)}">
                <a
                  th:each="categoria : ${categorias}"
                  th:href="@{/categorias/{id}(id=${categoria.id})}"
                  class="category-card"
                >
                  <i class="bi bi-heart-pulse"></i>
                  <span th:text="${categoria.nome}">Categoria</span>
                </a>
              </div>
            </section>

            <!-- Profissionais em Destaque -->
            <section>
              <h2>Profissionais em Destaque</h2>

              <p th:unless="${not #lists.isEmpty(profissionaisDestaque)}">
                Nenhum profissional encontrado.
              </p>

              <div class="professionals-grid">
                <div
                  th:each="prof : ${profissionaisDestaque}"
                  class="professional-card"
                >
                  <div class="card-info">
                    <h4 th:text="${prof.nome}">Nome</h4>
                    <span class="rating">
                      <i class="bi bi-star-fill"></i>
                      <!-- a avaliação virá do objeto prof quando tiver dados -->
                      5.0
                    </span>
                  </div>
                </div>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
