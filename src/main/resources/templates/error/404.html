<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{baseLayout :: baseHead(null)}"></head>
  <body>
    <div class="app">
      <aside th:replace="~{baseLayout :: baseSidebar}"></aside>
      <div class="main">
        <header th:replace="~{baseLayout :: baseTopbar}"></header>
        <div class="content">
          <main style="text-align: center; padding: 60px 40px">
            <i class="bi bi-search" style="font-size: 64px; color: #d1d5db"></i>
            <h1 style="font-size: 48px; color: #1f2937; margin: 20px 0 10px">
              404
            </h1>
            <h2
              style="color: #6b7280; font-weight: normal; margin-bottom: 30px"
            >
              Página não encontrada
            </h2>
            <p style="color: #9ca3af; margin-bottom: 40px">
              A página que você está procurando não existe ou foi removida.
            </p>
            <a th:href="@{/}" class="btn btn-primary">
              <i class="bi bi-house"></i> Voltar ao Início
            </a>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
