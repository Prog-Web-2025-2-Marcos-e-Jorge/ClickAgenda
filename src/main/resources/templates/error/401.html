<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{baseLayout :: baseHead(null)}"></head>
  <body>
    <div class="app">
      <aside th:replace="~{baseLayout :: baseSidebar}"></aside>
      <div class="main">
        <header th:replace="~{baseLayout :: baseTopbar}"></header>
        <div class="content">
          <main>
            <div style="text-align: center; padding: 80px 40px">
              <div style="margin-bottom: 30px">
                <i
                  class="bi bi-lock"
                  style="font-size: 80px; color: #ef4444"
                ></i>
              </div>
              <h1
                style="
                  font-size: 56px;
                  color: #1f2937;
                  margin: 0 0 15px;
                  font-weight: 600;
                "
              >
                401
              </h1>
              <h2
                style="
                  color: #6b7280;
                  font-weight: 500;
                  margin: 0 0 15px;
                  font-size: 24px;
                "
              >
                Não Autenticado
              </h2>
              <p
                style="
                  color: #9ca3af;
                  margin: 0 0 40px;
                  line-height: 1.6;
                  max-width: 500px;
                  margin-left: auto;
                  margin-right: auto;
                "
              >
                Você precisa estar autenticado para acessar este recurso. Faça
                login na sua conta para continuar.
              </p>
              <div
                style="
                  display: flex;
                  gap: 12px;
                  justify-content: center;
                  flex-wrap: wrap;
                "
              >
                <a th:href="@{/login}" class="btn btn-primary">
                  <i class="bi bi-box-arrow-in-right"></i> Fazer Login
                </a>
                <a th:href="@{/registro}" class="btn btn-secondary">
                  <i class="bi bi-person-plus"></i> Criar Conta
                </a>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
