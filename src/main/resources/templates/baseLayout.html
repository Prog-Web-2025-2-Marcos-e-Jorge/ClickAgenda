<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="baseHead">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click Agenda</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}" />
  </head>
  <body>
    <!-- Fragmento: Sidebar -->
    <aside th:fragment="baseSidebar">
      <nav>
        <a th:href="@{/}">Início</a>
        <a th:href="@{/agenda}">Agenda</a>
        <a th:href="@{/favoritos}">Favoritos</a>
        <a th:href="@{/perfil}">Perfil</a>
      </nav>
    </aside>

    <!-- Fragmento: Topbar -->
    <header th:fragment="baseTopbar">
      <span>Click Agenda</span>
      <span
        th:text="${usuario != null} ? 'Olá, ' + ${usuario.nome} + '!' : 'Olá, Usuário!'"
        >Olá, Usuário!</span
      >
    </header>
  </body>
</html>
