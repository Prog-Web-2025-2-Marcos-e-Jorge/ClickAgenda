<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="baseHead(cssExtra)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <title>Click Agenda</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link th:if="${cssExtra != null}" rel="stylesheet" th:href="${cssExtra}" />
  </head>
  <body>
    <aside class="sidebar" th:fragment="baseSidebar">
      <div class="logo">
        <span style="font-weight: bold; font-size: 20px">Click Agenda</span>
      </div>
      <nav class="menu">
        <a th:href="@{/}"><i class="bi bi-house"></i> Início</a>
        <a th:href="@{/profissionais}"><i class="bi bi-search"></i> Explorar</a>
        <a th:href="@{/perfil}"><i class="bi bi-person"></i> Meu Perfil</a>

        <!-- Menu Profissional -->
        <div
          th:if="${session.usuarioPerfil == 'PROFISSIONAL'}"
          style="
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
          "
        >
          <p
            style="
              font-size: 12px;
              color: #999;
              margin-bottom: 10px;
              text-transform: uppercase;
            "
          >
            Meus Serviços
          </p>
          <a th:href="@{/servico/novo}">
            <i class="bi bi-plus-circle"></i> Cadastrar Serviço
          </a>
        </div>

        <!-- Menu Administração -->
        <div
          th:if="${session.usuarioPerfil == 'ADMIN'}"
          style="
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
          "
        >
          <p
            style="
              font-size: 12px;
              color: #999;
              margin-bottom: 10px;
              text-transform: uppercase;
            "
          >
            Administração
          </p>
          <a th:href="@{/categoria/novo}">
            <i class="bi bi-folder-plus"></i> Cadastrar Categoria
          </a>
          <a th:href="@{/servico/novo}" style="margin-top: 8px">
            <i class="bi bi-plus-circle"></i> Cadastrar Serviço
          </a>
        </div>
      </nav>
    </aside>

    <header class="header" th:fragment="baseTopbar">
      <span>Click Agenda</span>
      <span th:if="${session.usuarioNome != null}">
        Olá, <span th:text="${session.usuarioNome}">Usuário</span>!
        <form th:action="@{/logout}" method="post" style="display: inline; margin-left: 20px;">
          <button type="submit" style="background: none; border: none; color: #666; cursor: pointer; padding: 0; font: inherit; text-decoration: none;">
            Sair
          </button>
        </form>
      </span>
      <span th:if="${session.usuarioNome == null}">
        <a th:href="@{/login}" style="color: #666; text-decoration: none">
          Login
        </a>
      </span>
    </header>
  </body>
</html>
