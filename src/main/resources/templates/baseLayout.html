<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="baseHead(cssExtra)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <title>Click Agenda</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link th:if="${cssExtra != null}" rel="stylesheet" th:href="${cssExtra}" />
  </head>
  <body>
    <aside class="sidebar" th:fragment="baseSidebar">
      <div class="logo">
        <span style="font-weight: bold; font-size: 20px">Click Agenda</span>
      </div>
      <nav class="menu">
        <a th:href="@{/}"><i class="bi bi-house"></i> Início</a>
        <a th:href="@{/profissionais}"><i class="bi bi-search"></i> Explorar</a>
        <a th:href="@{/perfil}"><i class="bi bi-person"></i> Meu Perfil</a>

        <!-- Menu Profissional -->
        <a
          th:if="${session.usuarioPerfil == 'PROFISSIONAL'}"
          th:href="@{/servico/novo}"
        >
          <i class="bi bi-plus-circle"></i> Cadastrar Serviço
        </a>
        <a
          th:if="${session.usuarioPerfil == 'PROFISSIONAL'}"
          th:href="@{/horario/novo}"
        >
          <i class="bi bi-clock"></i> Meus Horários
        </a>

        <!-- Menu Administração -->
        <a
          th:if="${session.usuarioPerfil == 'ADMIN'}"
          th:href="@{/categoria/novo}"
        >
          <i class="bi bi-folder-plus"></i> Cadastrar Categoria
        </a>
        <a
          th:if="${session.usuarioPerfil == 'ADMIN'}"
          th:href="@{/servico/novo}"
        >
          <i class="bi bi-plus-circle"></i> Cadastrar Serviço
        </a>

        <!-- Sair -->
        <a
          th:href="@{/logout}"
          style="
            margin-top: 20px;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
            color: #dc2626;
          "
        >
          <i class="bi bi-box-arrow-right"></i> Sair
        </a>
      </nav>
    </aside>

    <header class="header" th:fragment="baseTopbar">
      <span th:if="${session.usuarioNome != null}">
        Olá, <strong th:text="${session.usuarioNome}">Usuário</strong>!
      </span>
      <span th:if="${session.usuarioNome == null}">
        <a th:href="@{/login}" style="color: #666; text-decoration: none"
          >Login</a
        >
      </span>
    </header>
  </body>
</html>
