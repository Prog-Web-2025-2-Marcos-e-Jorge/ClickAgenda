<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="baseHead">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click Agenda</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}" />
  </head>
  <body>
    <!-- Fragmento: Sidebar -->
    <aside th:fragment="baseSidebar">
      <nav>
        <a th:href="@{/}">Início</a>
        <a th:href="@{/agenda}">Agenda</a>
        <a th:href="@{/favoritos}">Favoritos</a>
        <a th:href="@{/perfil}">Perfil</a>
      </nav>
    </aside>

    <!-- Fragmento: Topbar -->
    <header th:fragment="baseTopbar">
      <span>Click Agenda</span>
      <span th:if="${session.usuarioNome != null}">
        Olá, <span th:text="${session.usuarioNome}">Usuário</span>!
        <a
          th:href="@{/logout}"
          style="margin-left: 20px; color: #666; text-decoration: none"
          >Sair</a
        >
      </span>
      <span th:if="${session.usuarioNome == null}">
        <a th:href="@{/login}" style="color: #666; text-decoration: none"
          >Login</a
        >
      </span>
    </header>
  </body>
</html>
