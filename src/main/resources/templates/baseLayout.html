<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="baseHead">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <title>Click Agenda</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <!-- Fragmento: Sidebar -->
    <aside class="sidebar" th:fragment="baseSidebar">
      <div class="logo">
        <span style="font-weight: bold; font-size: 20px">Click Agenda</span>
      </div>
      <nav class="menu">
        <a th:href="@{/}"><i class="bi bi-house"></i> Início</a>
        <a th:href="@{/agenda}"><i class="bi bi-calendar"></i> Agenda</a>
        <a th:href="@{/favoritos}"><i class="bi bi-heart"></i> Favoritos</a>
        <a th:href="@{/perfil}"><i class="bi bi-person"></i> Perfil</a>
      </nav>
    </aside>

    <!-- Fragmento: Topbar -->
    <header class="header" th:fragment="baseTopbar">
      <span>Click Agenda</span>
      <span th:if="${session.usuarioNome != null}">
        Olá, <span th:text="${session.usuarioNome}">Usuário</span>!
        <a
          th:href="@{/logout}"
          style="margin-left: 20px; color: #666; text-decoration: none"
          >Sair</a
        >
      </span>
      <span th:if="${session.usuarioNome == null}">
        <a th:href="@{/login}" style="color: #666; text-decoration: none"
          >Login</a
        >
      </span>
    </header>
  </body>
</html>
