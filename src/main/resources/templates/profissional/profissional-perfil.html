<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{baseLayout :: baseHead(null)}"></head>

  <body>
    <div class="app">
      <aside th:replace="~{baseLayout :: baseSidebar}"></aside>
      <div class="main">
        <header th:replace="~{baseLayout :: baseTopbar}"></header>
        <div class="content">
          <main>
            <a th:href="@{/profissionais}" class="btn btn-secondary">
              ← Voltar
            </a>

            <h1 th:text="${profissional.nome}">Nome do Profissional</h1>

            <div class="form-container" style="margin-bottom: 30px">
              <p>
                <strong>Email:</strong>
                <span th:text="${profissional.email}">email</span>
              </p>
              <p>
                <strong>Telefone:</strong>
                <span th:text="${profissional.telefone}">telefone</span>
              </p>

              <!-- Categorias -->
              <p style="margin-top: 10px"><strong>Especialidades:</strong></p>
              <p th:if="${#lists.isEmpty(profissional.categorias)}">
                Nenhuma categoria cadastrada.
              </p>
              <ul th:unless="${#lists.isEmpty(profissional.categorias)}">
                <li
                  th:each="cat : ${profissional.categorias}"
                  th:text="${cat.nome}"
                >
                  Categoria
                </li>
              </ul>
            </div>

            <!-- Serviços -->
            <h2 style="margin-bottom: 20px">Serviços disponíveis</h2>

            <p th:if="${#lists.isEmpty(profissional.servicos)}">
              Nenhum serviço cadastrado.
            </p>

            <div
              class="professionals-grid"
              th:unless="${#lists.isEmpty(profissional.servicos)}"
            >
              <div
                th:each="servico : ${profissional.servicos}"
                class="professional-card"
              >
                <div class="card-info">
                  <h4 th:text="${servico.nome}">Nome do Serviço</h4>
                  <p th:text="'Duração: ' + ${servico.duracaoMinutos} + ' min'">
                    Duração
                  </p>
                  <p
                    th:text="'R$ ' + ${#numbers.formatDecimal(servico.valor, 1, 'COMMA', 2, 'POINT')}"
                  >
                    Valor
                  </p>
                  <a
                    th:href="@{/agendamento/novo(servicoId=${servico.id})}"
                    class="btn btn-primary"
                    style="margin-top: 10px"
                  >
                    Agendar
                  </a>
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
