<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{baseLayout :: baseHead(null)}"></head>

  <body>
    <div class="app">
      <aside th:replace="~{baseLayout :: baseSidebar}"></aside>
      <div class="main">
        <header th:replace="~{baseLayout :: baseTopbar}"></header>
        <div class="content">
          <main>
            <h1>Serviço Cadastrado com Sucesso!</h1>
            <p>
              O serviço foi adicionado ao sistema e está pronto para
              agendamentos.
            </p>

            <div class="success-actions">
              <a th:href="@{/}" class="btn btn-primary">Voltar ao Início</a>
              <a th:href="@{/servico/novo}" class="btn btn-secondary"
                >Cadastrar Outro Serviço</a
              >
            </div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
